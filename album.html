<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>해린이 첫돌 초대장 · 앨범</title>
    <link rel="stylesheet" href="./shared-header.css" />
    <style>
      @font-face {
        font-family: "CAChildrenModu";
        src: url("./_resource/font/cachildren-modu.otf") format("opentype");
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "NostalgicPoliceFairness";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/Griun_PolFairness-Rg.woff2") format("woff2");
        font-weight: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "NanumBarunGothic";
        src: url("//cdn.jsdelivr.net/font-nanumlight/1.0/NanumBarunGothicWeb.eot");
        font-weight: 400;
        font-display: swap;
      }

      @font-face {
        font-family: "NanumBarunGothic";
        src: url("//cdn.jsdelivr.net/font-nanumlight/1.0/NanumBarunGothicWebBold.eot");
        font-weight: 700;
        font-display: swap;
      }

      @font-face {
        font-family: "NanumBarunGothic";
        src: url("//cdn.jsdelivr.net/font-nanumlight/1.0/NanumBarunGothicWebLight.eot");
        font-weight: 300;
        font-display: swap;
      }

      * { box-sizing: border-box; }
      :root {
        --line: #000000;
        --paper: #fff8bf;
        --paper-alt: #ffd3f1;
        --paper-mint: #d4ffd5;
        --bg: #ffffff;
        --shared-hero-bg: #d2fc4f;
        --font-body: "CAChildrenModu", "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
      }
      body {
        margin: 0;
        font-family: var(--font-body);
        background: #ffffff;
        color: #000000;
      }
      a { color: inherit; text-decoration: none; }
      img { display: block; width: 100%; }
      h1 { margin: 0; }
      .page {
        width: 100%;
      }
      .title {
        padding: 22px 22px 0;
      }
      .album-story {
        width: min(100%, 920px);
        margin: 0 auto;
        padding: 72px 22px 96px;
      }
      .album-section + .album-section {
        margin-top: 120px;
      }
      .album-date {
        margin: 0 0 18px;
        font-size: clamp(24px, 4vw, 36px);
        line-height: 1.2;
        letter-spacing: -0.04em;
        font-weight: 400;
      }
      .album-media {
        width: 100%;
      }
      .album-media img {
        height: auto;
      }
      .album-media.grid-two {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }
      .album-copy {
        margin-top: 26px;
        font-size: clamp(20px, 2.8vw, 27px);
        line-height: 1.36;
        letter-spacing: -0.03em;
        color: #666666;
      }
      @media (max-width: 640px) {
        .album-story {
          padding: 52px 22px 72px;
        }
        .album-section + .album-section {
          margin-top: 92px;
        }
        .album-media.grid-two {
          gap: 12px;
        }
        .album-copy {
          margin-top: 18px;
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero shared-hero" data-shared-menu>
        <button class="hero-label shared-hero-toggle" data-shared-menu-button type="button" aria-expanded="false" aria-controls="album-shared-menu">MENU</button>
        <div class="hero-menu shared-hero-menu" id="album-shared-menu" data-shared-menu-panel>
          <a href="./diary.html">해린이에 대하여</a>
          <a href="./album.html">시크릿 사진첩</a>
          <a href="./wishlist.html">선물 리스트</a>
          <a href="./location.html">오시는길</a>
        </div>
      </section>
      <h1 class="title shared-title">시크릿 사진첩</h1>
      <section class="album-story">
        <article class="album-section">
          <h2 class="album-date">2025.05.12. 한해린 탄생일</h2>
          <div class="album-media">
            <img src="./_resource/album/출생.jpeg" alt="태어난 직후의 해린이" />
          </div>
          <p class="album-copy">오전 11시 42분. 3.43kg의 작고 소중한 해린이가 태어났단다.<br />엄마는 그때 죽을뻔했었지만 너를 보고 싶어서 얼렁 차병원으로 달려가고 싶었어.</p>
        </article>

        <article class="album-section">
          <h2 class="album-date">2025.05.18. 아빠가 너를 처음 안아본날</h2>
          <div class="album-media grid-two">
            <img src="./_resource/album/조리원에서_2.jpeg" alt="아빠가 해린이를 처음 안아본 모습" />
            <img src="./_resource/album/조리원에서.jpeg" alt="엄마 아빠와 함께 있는 해린이" />
          </div>
          <p class="album-copy">병원에서 한번도 못안아보고 조리원오자마자 너를 안아보고 아빠는 무한한 감동을 느꼈단다. 우리가 가족이 된게 너무 새롭고 신기한 날이었어.</p>
        </article>
      </section>
    </main>

    <script src="./shared-header.js"></script>
  </body>
</html>

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>해린이 첫돌 초대장 · 다이어리</title>
    <style>
      * { box-sizing: border-box; }
      :root {
        --line: #000000;
        --pink: #ff39d1;
        --mint: #71ffae;
        --lavender: #f4c6ff;
        --paper: #fff9db;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(244, 198, 255, 0.4), transparent 22%),
          radial-gradient(circle at bottom right, rgba(113, 255, 174, 0.18), transparent 24%),
          #ffffff;
        color: #000000;
      }
      a { color: inherit; text-decoration: none; }
      img { display: block; width: 100%; }
      h1, p { margin: 0; }
      .hero {
        padding: 28px 22px 24px;
        background: linear-gradient(135deg, #ffffff 0%, var(--lavender) 100%);
        border-bottom: 8px solid var(--line);
      }
      .eyebrow {
        display: block;
        margin-bottom: 14px;
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      .title {
        max-width: 820px;
        font-size: clamp(46px, 9vw, 96px);
        line-height: 0.94;
        letter-spacing: -0.06em;
        font-weight: 900;
      }
      .lead {
        max-width: 620px;
        margin-top: 14px;
        font-size: 18px;
        font-weight: 700;
      }
      .back {
        display: inline-flex;
        margin-top: 18px;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .diary-scene {
        display: grid;
        border-top: 8px solid var(--line);
        border-bottom: 8px solid var(--line);
      }
      .scene-photo {
        padding: 22px;
        background: linear-gradient(135deg, #ffffff 0%, #f8d8ff 100%);
        border-bottom: 8px solid var(--line);
      }
      .photo-frame {
        border: 8px solid var(--line);
        background: #ffffff;
        box-shadow: 10px 10px 0 rgba(0, 0, 0, 0.12);
        overflow: hidden;
      }
      .photo-frame img {
        aspect-ratio: 16 / 11;
        object-fit: cover;
      }
      .scene-copy {
        padding: 28px 22px 32px;
        background: var(--mint);
      }
      .quote {
        max-width: 760px;
        font-size: clamp(40px, 8vw, 86px);
        line-height: 0.94;
        letter-spacing: -0.06em;
        font-weight: 900;
        white-space: pre-line;
      }
      .memo {
        max-width: 460px;
        margin-top: 20px;
        padding: 14px 16px;
        border: 4px solid var(--line);
        background: var(--paper);
        font-size: 15px;
        line-height: 1.5;
        font-weight: 700;
        box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.14);
      }
      .memo strong {
        display: block;
        margin-bottom: 6px;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      @media (min-width: 740px) {
        .diary-scene {
          grid-template-columns: 1fr 1fr;
        }
        .scene-photo {
          border-right: 8px solid var(--line);
          border-bottom: 0;
        }
        .scene-copy {
          display: flex;
          flex-direction: column;
          justify-content: center;
          min-height: 100%;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <span class="eyebrow">Diary</span>
        <h1 class="title">엄마 아빠가 적어둔,<br />짧고 오래 남을 문장.</h1>
        <p class="lead">한 장면과 한 문장을 오래 바라보게 되는, 조용한 기록 화면으로 정리했습니다.</p>
        <a class="back" href="./index.html#invitation-content">Back to menu</a>
      </section>

      <section class="diary-scene">
        <div class="scene-photo">
          <div class="photo-frame">
            <img src="./_resource/sample_1-1.jpeg" alt="해린이의 일상 사진" />
          </div>
        </div>
        <div class="scene-copy">
          <p class="quote">너를 키운다기보다,
우리도 너와 함께 하루하루 자라고 있다는 걸
자주 느끼는 1년이었어.</p>
          <p class="memo"><strong>Note</strong>해린이와 보낸 시간은 특별한 사건보다도, 매일 조금씩 더 사랑하게 되는 감정으로 기억될 것 같아요.</p>
        </div>
      </section>
    </main>
  </body>
</html>

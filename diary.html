<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>해린이 첫돌 초대장 · 다이어리</title>
    <link rel="stylesheet" href="./shared-header.css" />
    <style>
      * { box-sizing: border-box; }
      :root {
        --line: #000000;
        --pink: #ff39d1;
        --mint: #71ffae;
        --lavender: #f4c6ff;
        --paper: #fff9db;
        --shared-hero-bg: #fff5b0;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
        background: #ffffff;
        color: #000000;
      }
      a { color: inherit; text-decoration: none; }
      img { display: block; width: 100%; }
      h1, p { margin: 0; }
      .title {
        padding: 22px 22px 0;
      }
      .diary-scene {
        display: grid;
        border-bottom: 4px solid var(--line);
      }
      .scene-photo {
        padding: 22px;
        background: linear-gradient(135deg, #ffffff 0%, #fff8fe 100%);
        border-bottom: 4px solid var(--line);
      }
      .photo-frame {
        border: 4px solid var(--line);
        background: #ffffff;
        box-shadow: 10px 10px 0 rgba(0, 0, 0, 0.12);
        overflow: hidden;
      }
      .photo-frame img {
        aspect-ratio: 16 / 11;
        object-fit: cover;
      }
      .scene-copy {
        padding: 28px 22px 32px;
        background: linear-gradient(135deg, #efffd6 0%, #dff8b7 100%);
      }
      .quote {
        max-width: 760px;
        font-size: clamp(40px, 8vw, 86px);
        line-height: 0.94;
        letter-spacing: -0.06em;
        font-weight: 900;
        white-space: pre-line;
      }
      .memo {
        max-width: 460px;
        margin-top: 20px;
        padding: 14px 16px;
        border: 2px solid var(--line);
        background: #fffdf4;
        font-size: 15px;
        line-height: 1.5;
        font-weight: 700;
        box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.14);
      }
      .memo strong {
        display: block;
        margin-bottom: 6px;
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      @media (min-width: 740px) {
        .diary-scene {
          grid-template-columns: 1fr 1fr;
        }
        .scene-photo {
          border-right: 4px solid var(--line);
          border-bottom: 0;
        }
        .scene-copy {
          display: flex;
          flex-direction: column;
          justify-content: center;
          min-height: 100%;
          border-left: 4px solid var(--line);
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero shared-hero" data-shared-menu>
        <button class="shared-hero-toggle" data-shared-menu-button type="button" aria-expanded="false" aria-controls="diary-shared-menu">MENU</button>
        <div class="shared-hero-menu" id="diary-shared-menu" data-shared-menu-panel>
          <a href="./diary.html">해린이에 대하여</a>
          <a href="./album.html">시크릿 사진첩</a>
          <a href="./wishlist.html">선물 리스트</a>
          <a href="./location.html">오시는길</a>
        </div>
      </section>
      <h1 class="title shared-title">해린이에 대하여</h1>

      <section class="diary-scene">
        <div class="scene-photo">
          <div class="photo-frame">
            <img src="./_resource/sample_1-1.jpeg" alt="해린이의 일상 사진" />
          </div>
        </div>
        <div class="scene-copy">
          <p class="quote">너를 키운다기보다,
우리도 너와 함께 하루하루 자라고 있다는 걸
자주 느끼는 1년이었어.</p>
          <p class="memo"><strong>Note</strong>해린이와 보낸 시간은 특별한 사건보다도, 매일 조금씩 더 사랑하게 되는 감정으로 기억될 것 같아요.</p>
        </div>
      </section>
    </main>
    <script src="./shared-header.js"></script>
  </body>
</html>

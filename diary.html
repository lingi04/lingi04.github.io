<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>해린이 첫돌 초대장 · 다이어리</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif; background: #fff; color: #000; }
      a { color: inherit; text-decoration: none; }
      img { display: block; width: 100%; }
      h1, p { margin: 0; }
      .hero, .panel { padding: 28px 22px; }
      .hero { background: linear-gradient(135deg, #fff 0%, #f4c6ff 100%); border-bottom: 8px solid #000; }
      .eyebrow { display: block; margin-bottom: 14px; font-size: 12px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; }
      .title { max-width: 820px; font-size: clamp(46px, 9vw, 96px); line-height: 0.94; letter-spacing: -0.06em; font-weight: 900; }
      .back { display: inline-flex; margin-top: 18px; font-size: 13px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; }
      .layout { display: grid; border-top: 8px solid #000; border-bottom: 8px solid #000; }
      .visual { background: linear-gradient(135deg, #fff 0%, #f4c6ff 100%); border-right: 8px solid #000; }
      .copy { background: #73ffb0; }
      .visual img { aspect-ratio: 16 / 11; object-fit: cover; border: 8px solid #000; }
      .quote { max-width: 760px; font-size: clamp(42px, 8vw, 86px); line-height: 0.94; letter-spacing: -0.06em; font-weight: 900; white-space: pre-line; }
      .note { margin-top: 16px; font-size: 15px; font-weight: 700; }
      @media (min-width: 740px) { .layout { grid-template-columns: 1fr 1fr; } }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <span class="eyebrow">Diary</span>
        <h1 class="title">엄마 아빠가 적어둔,<br />짧고 오래 남을 문장.</h1>
        <a class="back" href="./index.html#invitation-content">Back to menu</a>
      </section>
      <section class="layout">
        <div class="panel visual">
          <img src="./_resource/sample_1-1.jpeg" alt="해린이의 일상 사진" />
        </div>
        <div class="panel copy">
          <p class="quote">너를 키운다기보다,
우리도 너와 함께 하루하루 자라고 있다는 걸
자주 느끼는 1년이었어.</p>
          <p class="note">`sample_1.png`처럼 사진 위에 짧은 기록이 놓이는 감각을 별도 화면으로 분리했습니다.</p>
        </div>
      </section>
    </main>
  </body>
</html>

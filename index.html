<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>해린이 첫돌 초대장</title>
    <style>
      @font-face {
        font-family: "CAChildrenModu";
        src: url("./_resource/font/cachildren-modu.otf") format("opentype");
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "NostalgicPoliceFairness";
        src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2601-6@1.0/Griun_PolFairness-Rg.woff2") format("woff2");
        font-weight: normal;
        font-display: swap;
      }

      @font-face {
        font-family: "NanumBarunGothic";
        src: url("//cdn.jsdelivr.net/font-nanumlight/1.0/NanumBarunGothicWeb.eot");
        font-weight: 400;
        font-display: swap;
      }

      @font-face {
        font-family: "NanumBarunGothic";
        src: url("//cdn.jsdelivr.net/font-nanumlight/1.0/NanumBarunGothicWebBold.eot");
        font-weight: 700;
        font-display: swap;
      }

      @font-face {
        font-family: "NanumBarunGothic";
        src: url("//cdn.jsdelivr.net/font-nanumlight/1.0/NanumBarunGothicWebLight.eot");
        font-weight: 300;
        font-display: swap;
      }

      :root {
        --bg: #fff8f2;
        --bg-soft: #fffdf9;
        --card: rgba(255, 255, 255, 0.92);
        --text: #4f4038;
        --muted: #85736c;
        --accent: #f2b29d;
        --accent-strong: #e98a6a;
        --accent-soft: #fff0e7;
        --line: rgba(127, 91, 73, 0.14);
        --shadow: 0 22px 56px rgba(115, 76, 58, 0.12);
        --radius-xl: 30px;
        --radius-lg: 22px;
        --radius-md: 16px;
        --max-width: 880px;
        --font-body: "NanumBarunGothic", "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
        --font-marquee: "CAChildrenModu", "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
        --font-display: "NostalgicPoliceFairness", "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        font-family: var(--font-body);
        color: var(--text);
        line-height: 1.7;
        word-break: keep-all;
        background: #ffffff;
        overflow-x: hidden;
      }

      img {
        display: block;
        width: 100%;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      input,
      label {
        font: inherit;
      }

      button {
        border: 0;
        cursor: pointer;
      }

      h1,
      h2,
      h3,
      p,
      figure {
        margin: 0;
      }

      .container {
        width: min(calc(100% - 28px), var(--max-width));
        margin: 0 auto;
      }

      .section {
        padding: 34px 0;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow);
        backdrop-filter: blur(7px);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 7px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.85);
        border: 1px solid rgba(242, 178, 157, 0.38);
        color: #a0614d;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .landing {
        min-height: 100svh;
        display: flex;
        align-items: stretch;
        justify-content: center;
        padding: 0;
        background: #ffffff;
      }

      .landing .container {
        width: min(100%, 1440px);
      }

      .landing-shell {
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 18px 16px 22px;
        background: #ffffff;
      }

      .landing-top,
      .landing-bottom {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 14px;
      }

      .landing-label {
        color: #111111;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .landing-step {
        color: #6f6f6f;
        font-size: 12px;
      }

      .landing-stage {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 0;
        padding: 14px 0;
      }

      .landing-media {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        min-height: 0;
      }

      .landing-media img,
      .landing-media video {
        display: block;
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
        object-fit: contain;
      }

      .landing-video-media {
        height: min(78svh, 920px);
      }

      .landing-letter-media {
        height: min(82svh, 980px);
      }

      .landing-copy {
        color: #4c4c4c;
        font-size: 12px;
        line-height: 1.6;
        max-width: 560px;
      }

      .button-row {
        display: grid;
        gap: 10px;
      }

      .button {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        width: auto;
        min-height: 46px;
        padding: 12px 20px;
        border-radius: 999px;
        background: #111111;
        color: #ffffff;
        font-weight: 700;
        letter-spacing: 0.02em;
        box-shadow: none;
      }

      .button.secondary {
        background: #ffffff;
        color: #111111;
        border: 1px solid rgba(17, 17, 17, 0.16);
        box-shadow: none;
      }

      .story-main {
        background: #ffffff;
      }

      .overview-section {
        position: relative;
        display: flex;
        flex-direction: column;
        min-height: 100svh;
        border-bottom: 4px solid #000000;
        background: #ffffff;
        overflow: hidden;
      }

      .overview-decoration {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 3;
      }

      .overview-heart {
        position: absolute;
        width: 84px;
        opacity: 0.92;
        pointer-events: auto;
        touch-action: none;
        cursor: grab;
        user-select: none;
      }

      .overview-heart.is-dragging {
        cursor: grabbing;
      }

      .overview-section > *:not(.overview-decoration) {
        position: relative;
        z-index: 1;
      }

      .overview-message {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 58px;
        padding: 10px 14px;
        overflow: hidden;
        text-align: center;
        color: #000000;
        font-family: var(--font-marquee);
        font-size: clamp(26px, 5.9vw, 54px);
        line-height: 1.05;
      }

      .overview-message-track {
        position: absolute;
        left: 100%;
        top: 50%;
        width: max-content;
        pointer-events: none;
        will-change: transform;
        animation: overview-marquee var(--marquee-duration, 12s) linear infinite;
      }

      .overview-message-copy {
        display: block;
        width: max-content;
        letter-spacing: 0.08em;
        white-space: nowrap;
        transform: translateY(-50%);
      }

      @keyframes overview-marquee {
        from {
          transform: translateX(0);
        }

        to {
          transform: translateX(calc(-100vw - 100%));
        }
      }

      .overview-figure {
        padding: 0;
        border-bottom: 4px solid #000000;
        background: #ffffff;
      }

      .overview-figure img {
        display: block;
        width: 100%;
        min-height: 320px;
        height: auto;
        object-fit: cover;
      }

      .overview-menu {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: repeat(3, minmax(0, 1fr));
        gap: 0;
        min-height: 0;
      }

      .overview-tile,
      .overview-feature {
        min-height: 0;
        padding: 24px 18px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        color: #000000;
        overflow: hidden;
        font-family: var(--font-display);
      }

      .overview-tile {
        border-right: 4px solid #000000;
        border-bottom: 4px solid #000000;
      }

      .overview-tile:nth-child(2n) {
        border-right: 0;
      }

      .overview-tile.diary,
      .overview-tile.location {
        background: #fff5b0;
      }

      .overview-tile.album,
      .overview-tile.wishlist {
        background: #d2fc4f;
      }

      .overview-feature {
        grid-column: 1 / -1;
        gap: 6px;
        background: #92c3a4;
      }

      .overview-title {
        max-width: 100%;
        font-size: clamp(30px, 7vw, 50px);
        line-height: 0.92;
        letter-spacing: 0.02em;
        font-weight: 900;
        word-break: keep-all;
      }

      .overview-feature-title {
        font-size: clamp(28px, 6.5vw, 58px);
        line-height: 0.94;
        letter-spacing: -0.06em;
        font-weight: 900;
        white-space: pre-line;
      }

      .story-main > section {
        padding: 0;
      }

      .story-main > section + section {
        border-top: 8px solid #000000;
      }

      .story-shell {
        width: 100%;
        margin: 0 auto;
        overflow-x: clip;
      }

      .story-eyebrow {
        display: block;
        margin-bottom: 14px;
        color: #000000;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .story-heading {
        max-width: 760px;
        font-size: 44px;
        line-height: 0.96;
        letter-spacing: -0.05em;
        color: #000000;
        font-weight: 900;
      }

      .story-lead {
        max-width: 620px;
        margin-top: 14px;
        color: #111111;
        font-size: 18px;
      }

      .album-panel,
      .journal-panel,
      .wishlist-panel,
      .info-panel {
        padding: 28px 22px;
      }

      .album-list {
        display: grid;
        gap: 0;
        margin-top: 0;
        border-top: 8px solid #000000;
      }

      .album-entry {
        display: grid;
        align-items: start;
        gap: 0;
        border-bottom: 8px solid #000000;
      }

      .album-image {
        border-right: 8px solid #000000;
      }

      .album-image img {
        aspect-ratio: 4 / 4;
        object-fit: cover;
      }

      .album-body {
        padding: 26px 22px;
      }

      .album-entry:nth-child(4n + 1) .album-body {
        background: #71ffae;
      }

      .album-entry:nth-child(4n + 2) .album-body {
        background: #ff39d1;
      }

      .album-entry:nth-child(4n + 3) .album-body {
        background: linear-gradient(135deg, #ffffff 0%, #f2bbff 100%);
      }

      .album-entry:nth-child(4n + 4) .album-body {
        background: #46f184;
      }

      .album-date {
        color: #000000;
        font-size: 12px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-weight: 700;
      }

      .album-title {
        margin-top: 8px;
        font-size: 34px;
        line-height: 0.98;
        letter-spacing: -0.04em;
        color: #000000;
        font-weight: 900;
      }

      .album-copy {
        margin-top: 10px;
        color: #000000;
        font-size: 16px;
      }

      .journal-layout {
        display: grid;
        gap: 0;
        margin-top: 0;
        border-top: 8px solid #000000;
        border-bottom: 8px solid #000000;
      }

      .journal-panel.visual {
        background: linear-gradient(135deg, #ffffff 0%, #f4c6ff 100%);
        border-right: 8px solid #000000;
      }

      .journal-panel.copy {
        background: #73ffb0;
      }

      .journal-header {
        border-bottom: 8px solid #000000;
      }

      .journal-visual img {
        aspect-ratio: 16 / 11;
        object-fit: cover;
        border: 8px solid #000000;
      }

      .journal-quote {
        max-width: 700px;
        font-size: 42px;
        line-height: 0.98;
        letter-spacing: -0.05em;
        color: #000000;
        white-space: pre-line;
        font-weight: 900;
      }

      .journal-note {
        margin-top: 14px;
        color: #000000;
        font-size: 14px;
        font-weight: 700;
      }

      .detail-anchor {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        margin-top: 18px;
        color: #000000;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      #detail-album,
      #detail-diary,
      #detail-wishlist,
      #detail-location {
        scroll-margin-top: 18px;
      }

      .wishlist-summary {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 12px;
        padding: 26px 22px;
        margin-bottom: 0;
        background: linear-gradient(135deg, #73ffb0 0%, #effff5 100%);
        color: #000000;
        border-bottom: 8px solid #000000;
      }

      .wishlist-summary strong {
        font-size: 38px;
        line-height: 0.96;
        letter-spacing: -0.05em;
        font-weight: 900;
      }

      .wishlist-grid {
        display: grid;
        gap: 0;
        border-top: 0;
      }

      .gift-option {
        position: relative;
      }

      .gift-option input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .gift-label {
        display: block;
        padding: 24px 22px;
        border-bottom: 8px solid #000000;
        background: #ffffff;
        transition: padding-left 0.2s ease, border-color 0.2s ease;
      }

      .gift-option:nth-child(odd) .gift-label {
        background: #ff39d1;
      }

      .gift-option:nth-child(even) .gift-label {
        background: #46f184;
      }

      .gift-name {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 8px;
        font-weight: 700;
        color: #111111;
      }

      .gift-tag {
        display: inline-flex;
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.86);
        color: #000000;
        font-size: 11px;
        font-weight: 700;
      }

      .gift-desc {
        color: #000000;
        font-size: 14px;
      }

      .gift-option input:checked + .gift-label {
        padding-left: 14px;
        border-color: #000000;
      }

      .wishlist-note {
        margin-top: 0;
        padding: 18px 22px 0;
        color: #000000;
        font-size: 13px;
        font-weight: 700;
      }

      .details-grid {
        display: grid;
        gap: 0;
        margin-top: 0;
        border-top: 8px solid #000000;
      }

      .details-row {
        display: grid;
        grid-template-columns: 110px 1fr;
        gap: 16px;
        align-items: start;
        padding: 22px;
        border-bottom: 8px solid #000000;
      }

      .details-row:last-child {
        border-bottom: 8px solid #000000;
      }

      .details-label {
        color: #000000;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        font-size: 12px;
      }

      .details-grid > div:first-child .details-row:nth-child(odd),
      .details-grid > div:last-child .details-row:nth-child(even) {
        background: #73ffb0;
      }

      .details-grid > div:first-child .details-row:nth-child(even),
      .details-grid > div:last-child .details-row:nth-child(odd) {
        background: #ff39d1;
      }

      .map-box {
        margin-top: 0;
        overflow: hidden;
        border-top: 0;
        border-bottom: 8px solid #000000;
      }

      .map-box iframe {
        display: block;
        width: 100%;
        height: 280px;
        border: 0;
      }

      .location-actions {
        margin-top: 0;
        padding: 22px 0 0;
      }

      .info-header {
        background: linear-gradient(135deg, #ffffff 0%, #ffd2f6 100%);
        border-bottom: 8px solid #000000;
      }

      .footer {
        padding: 24px 0 40px;
        color: #000000;
        text-align: center;
        font-size: 13px;
        font-weight: 700;
      }

      @media (min-width: 740px) {
        .section {
          padding: 42px 0;
        }

        .landing-shell {
          padding: 22px 28px 26px;
        }

        .landing-label {
          font-size: 12px;
        }

        .landing-step {
          font-size: 13px;
        }

        .landing-copy {
          font-size: 13px;
        }

        .landing-video-media {
          height: min(84svh, 980px);
        }

        .landing-letter-media {
          height: min(88svh, 1080px);
        }

        .story-heading {
          font-size: 86px;
        }

        .overview-title {
          font-size: clamp(52px, 6vw, 84px);
        }

        .album-entry {
          grid-template-columns: 1fr 1fr;
        }

        .album-entry:nth-child(even) .album-image {
          order: 2;
        }

        .album-entry:nth-child(even) .album-body {
          order: 1;
        }

        .journal-layout {
          grid-template-columns: 1fr 1fr;
          align-items: end;
        }

        .details-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
          column-gap: 0;
        }

        .button-row {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 920px) {
        .overview-section {
          min-height: 100svh;
        }

        .overview-tile,
        .overview-feature {
          padding: 20px 16px;
        }
      }
    </style>
  </head>
  <body>
    <section class="landing" id="landing-video">
      <div class="container">
        <div class="landing-shell">
          <div class="landing-top">
            <span class="landing-label">Hae-rin First Birthday</span>
            <span class="landing-step">01 / 02</span>
          </div>

          <div class="landing-stage">
            <div class="landing-media landing-video-media">
              <video id="birth-video" autoplay muted playsinline preload="auto">
                <source src="./_resource/haerin-is-born.mp4" type="video/mp4" />
              </video>
            </div>
          </div>

          <div class="landing-bottom">
            <p class="landing-copy">클릭하면 영상이 마지막 장면으로 이동하고, 스크롤하면 영상이 끝으로 이동한 뒤 다음 화면으로 이어집니다.</p>
            <div>
              <div class="button-row">
                <button class="button" id="continue-button" type="button">touch to continue</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="landing" id="landing-letter">
      <div class="container">
        <div class="landing-shell">
          <div class="landing-top">
            <span class="landing-label">Hae-rin First Birthday</span>
            <span class="landing-step">02 / 02</span>
          </div>

          <div class="landing-stage">
            <div class="landing-media landing-letter-media">
              <img src="./_resource/landing_letter.jpg" alt="랜딩 편지 이미지" />
            </div>
          </div>

          <div class="landing-bottom">
            <p class="landing-copy">이미지 비율을 유지한 채 화면을 꽉 채워 보여주고, 클릭 또는 스크롤 시 본문으로 이어집니다.</p>
            <div class="landing-copy">tap or scroll</div>
          </div>
        </div>
      </div>
    </section>

    <main class="story-main" id="invitation-content">
      <section>
        <div class="story-shell">
          <div class="overview-section">
            <div class="overview-decoration" aria-hidden="true">
              <img class="overview-heart" data-overview-heart src="./_resource/heart.svg" alt="" />
              <img class="overview-heart" data-overview-heart src="./_resource/heart.svg" alt="" />
            </div>

            <div class="overview-message" aria-label="사랑해 한해린 귀여워 죽겠어 우주만큼">
              <div class="overview-message-track" data-marquee-track data-marquee-speed="110">
                <p class="overview-message-copy">사랑해 한해린 귀여워 죽겠어 우주만큼♥</p>
              </div>
            </div>

            <div class="overview-figure">
              <img src="./_resource/index_page_haerin.png" alt="해린이 인덱스 대표 이미지" />
            </div>

            <div class="overview-menu">
              <a class="overview-tile diary" href="./diary.html">
                <strong class="overview-title">해린이에 대하여</strong>
              </a>
              <a class="overview-tile album" href="./album.html">
                <strong class="overview-title">시크릿<br />사진첩</strong>
              </a>
              <a class="overview-tile wishlist" href="./wishlist.html">
                <strong class="overview-title">선물리스트</strong>
              </a>
              <a class="overview-tile location" href="./location.html">
                <strong class="overview-title">오시는길</strong>
              </a>
              <div class="overview-feature" aria-label="해링구 돌잔치 프로젝트">
                <strong class="overview-feature-title">해링구
돌잔치 프로젝트</strong>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      let landingScrollLocked = false;
      let touchStartY = 0;
      let landingScrollTransitionTimer = null;
      let birthVideoEndedPreview = false;

      const birthVideo = document.getElementById("birth-video");
      const videoLanding = document.getElementById("landing-video");
      const letterLanding = document.getElementById("landing-letter");
      const invitationContent = document.getElementById("invitation-content");
      const continueButton = document.getElementById("continue-button");
      const marqueeTracks = document.querySelectorAll("[data-marquee-track]");
      const overviewSection = document.querySelector(".overview-section");
      const overviewHearts = document.querySelectorAll("[data-overview-heart]");
      const HEART_SIZE = 84;
      const HEART_SPEED = 120;
      let overviewHeartStates = [];
      let overviewHeartAnimationFrame = null;
      let overviewHeartLastTime = 0;
      let draggedHeartState = null;
      let draggedHeartPointerId = null;
      let draggedHeartOffsetX = 0;
      let draggedHeartOffsetY = 0;
      let draggedHeartLastPointerX = 0;
      let draggedHeartLastPointerY = 0;
      let draggedHeartLastPointerTime = 0;

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function createHeartVelocity() {
        const angle = Math.random() * Math.PI * 2;
        return {
          vx: Math.cos(angle) * HEART_SPEED,
          vy: Math.sin(angle) * HEART_SPEED,
        };
      }

      function normalizeHeartVelocity(state) {
        const magnitude = Math.hypot(state.vx, state.vy);

        if (magnitude === 0) {
          Object.assign(state, createHeartVelocity());
          return;
        }

        state.vx = (state.vx / magnitude) * HEART_SPEED;
        state.vy = (state.vy / magnitude) * HEART_SPEED;
      }

      function setHeartPosition(state) {
        state.element.style.left = state.x + "px";
        state.element.style.top = state.y + "px";
      }

      function getOverviewBounds() {
        return {
          maxLeft: Math.max(overviewSection.clientWidth - HEART_SIZE, 0),
          maxTop: Math.max(overviewSection.clientHeight - HEART_SIZE, 0),
        };
      }

      function initializeOverviewHearts() {
        if (!overviewSection || overviewHearts.length === 0) {
          return;
        }

        const sectionWidth = overviewSection.clientWidth;
        const sectionHeight = overviewSection.clientHeight;
        const placements = [];

        overviewHeartStates = Array.from(overviewHearts).map((heart) => {
          const maxLeft = Math.max(sectionWidth - HEART_SIZE, 0);
          const maxTop = Math.max(sectionHeight - HEART_SIZE, 0);

          let x = 0;
          let y = 0;

          for (let attempt = 0; attempt < 20; attempt += 1) {
            const nextX = Math.random() * maxLeft;
            const nextY = Math.random() * maxTop;
            const overlaps = placements.some((placement) => {
              const dx = placement.x - nextX;
              const dy = placement.y - nextY;
              return Math.hypot(dx, dy) < HEART_SIZE;
            });

            x = nextX;
            y = nextY;

            if (!overlaps) {
              break;
            }
          }

          placements.push({ x, y });

          const state = {
            element: heart,
            size: HEART_SIZE,
            x,
            y,
            ...createHeartVelocity(),
          };

          setHeartPosition(state);
          return state;
        });
      }

      function resizeOverviewHearts() {
        if (!overviewSection || overviewHeartStates.length === 0) {
          return;
        }

        const { maxLeft, maxTop } = getOverviewBounds();

        overviewHeartStates.forEach((state) => {
          state.x = clamp(state.x, 0, maxLeft);
          state.y = clamp(state.y, 0, maxTop);
          setHeartPosition(state);
        });
      }

      function reflectOverviewHeartOnWalls(state, maxLeft, maxTop) {
        if (state.x <= 0) {
          state.x = 0;
          state.vx = Math.abs(state.vx);
        } else if (state.x >= maxLeft) {
          state.x = maxLeft;
          state.vx = -Math.abs(state.vx);
        }

        if (state.y <= 0) {
          state.y = 0;
          state.vy = Math.abs(state.vy);
        } else if (state.y >= maxTop) {
          state.y = maxTop;
          state.vy = -Math.abs(state.vy);
        }
      }

      function resolveOverviewHeartCollisions() {
        for (let i = 0; i < overviewHeartStates.length; i += 1) {
          for (let j = i + 1; j < overviewHeartStates.length; j += 1) {
            const first = overviewHeartStates[i];
            const second = overviewHeartStates[j];
            const firstCenterX = first.x + first.size / 2;
            const firstCenterY = first.y + first.size / 2;
            const secondCenterX = second.x + second.size / 2;
            const secondCenterY = second.y + second.size / 2;
            const dx = secondCenterX - firstCenterX;
            const dy = secondCenterY - firstCenterY;
            const distance = Math.hypot(dx, dy);
            const minDistance = (first.size + second.size) / 2;

            if (distance === 0 || distance >= minDistance) {
              continue;
            }

            const normalX = dx / distance;
            const normalY = dy / distance;
            const overlap = minDistance - distance;
            const relativeVelocityX = second.vx - first.vx;
            const relativeVelocityY = second.vy - first.vy;
            const speedAlongNormal = relativeVelocityX * normalX + relativeVelocityY * normalY;

            first.x -= normalX * (overlap / 2);
            first.y -= normalY * (overlap / 2);
            second.x += normalX * (overlap / 2);
            second.y += normalY * (overlap / 2);

            if (speedAlongNormal >= 0) {
              continue;
            }

            const impulse = -speedAlongNormal;

            first.vx -= impulse * normalX;
            first.vy -= impulse * normalY;
            second.vx += impulse * normalX;
            second.vy += impulse * normalY;
            normalizeHeartVelocity(first);
            normalizeHeartVelocity(second);
          }
        }
      }

      function animateOverviewHearts(timestamp) {
        if (!overviewSection || overviewHeartStates.length === 0) {
          return;
        }

        if (overviewHeartLastTime === 0) {
          overviewHeartLastTime = timestamp;
        }

        const deltaTime = Math.min((timestamp - overviewHeartLastTime) / 1000, 0.033);
        overviewHeartLastTime = timestamp;
        const { maxLeft, maxTop } = getOverviewBounds();

        overviewHeartStates.forEach((state) => {
          if (state === draggedHeartState) {
            return;
          }

          state.x += state.vx * deltaTime;
          state.y += state.vy * deltaTime;
          reflectOverviewHeartOnWalls(state, maxLeft, maxTop);
        });

        resolveOverviewHeartCollisions();

        overviewHeartStates.forEach((state) => {
          reflectOverviewHeartOnWalls(state, maxLeft, maxTop);
          setHeartPosition(state);
        });

        overviewHeartAnimationFrame = window.requestAnimationFrame(animateOverviewHearts);
      }

      function syncDraggedHeartPosition(clientX, clientY) {
        if (!draggedHeartState || !overviewSection) {
          return;
        }

        const sectionRect = overviewSection.getBoundingClientRect();
        const { maxLeft, maxTop } = getOverviewBounds();
        draggedHeartState.x = clamp(clientX - sectionRect.left - draggedHeartOffsetX, 0, maxLeft);
        draggedHeartState.y = clamp(clientY - sectionRect.top - draggedHeartOffsetY, 0, maxTop);
        setHeartPosition(draggedHeartState);
      }

      function handleOverviewHeartPointerDown(event) {
        const state = overviewHeartStates.find((item) => item.element === event.currentTarget);
        if (!state || !overviewSection) {
          return;
        }

        const heartRect = state.element.getBoundingClientRect();
        draggedHeartState = state;
        draggedHeartPointerId = event.pointerId;
        draggedHeartOffsetX = event.clientX - heartRect.left;
        draggedHeartOffsetY = event.clientY - heartRect.top;
        draggedHeartLastPointerX = event.clientX;
        draggedHeartLastPointerY = event.clientY;
        draggedHeartLastPointerTime = event.timeStamp;
        state.element.classList.add("is-dragging");
        state.element.setPointerCapture(event.pointerId);
        event.preventDefault();
      }

      function handleOverviewHeartPointerMove(event) {
        if (!draggedHeartState || event.pointerId !== draggedHeartPointerId) {
          return;
        }

        const deltaX = event.clientX - draggedHeartLastPointerX;
        const deltaY = event.clientY - draggedHeartLastPointerY;
        const deltaTimeMs = Math.max(event.timeStamp - draggedHeartLastPointerTime, 1);
        draggedHeartState.vx = (deltaX / deltaTimeMs) * 1000;
        draggedHeartState.vy = (deltaY / deltaTimeMs) * 1000;
        syncDraggedHeartPosition(event.clientX, event.clientY);
        draggedHeartLastPointerX = event.clientX;
        draggedHeartLastPointerY = event.clientY;
        draggedHeartLastPointerTime = event.timeStamp;
        event.preventDefault();
      }

      function releaseDraggedHeart(event) {
        if (!draggedHeartState || event.pointerId !== draggedHeartPointerId) {
          return;
        }

        if (Math.hypot(draggedHeartState.vx, draggedHeartState.vy) > 0) {
          normalizeHeartVelocity(draggedHeartState);
        } else {
          Object.assign(draggedHeartState, createHeartVelocity());
        }

        draggedHeartState.element.classList.remove("is-dragging");
        if (draggedHeartState.element.hasPointerCapture(event.pointerId)) {
          draggedHeartState.element.releasePointerCapture(event.pointerId);
        }

        draggedHeartState = null;
        draggedHeartPointerId = null;
      }

      function startOverviewHeartAnimation() {
        initializeOverviewHearts();
        resizeOverviewHearts();

        overviewHearts.forEach((heart) => {
          heart.addEventListener("pointerdown", handleOverviewHeartPointerDown);
        });

        window.addEventListener("pointermove", handleOverviewHeartPointerMove, { passive: false });
        window.addEventListener("pointerup", releaseDraggedHeart);
        window.addEventListener("pointercancel", releaseDraggedHeart);

        if (overviewHeartAnimationFrame !== null) {
          window.cancelAnimationFrame(overviewHeartAnimationFrame);
        }

        overviewHeartLastTime = 0;
        overviewHeartAnimationFrame = window.requestAnimationFrame(animateOverviewHearts);
      }

      function updateMarqueeSpeeds() {
        marqueeTracks.forEach((track) => {
          const speed = Number(track.dataset.marqueeSpeed) || 100;
          const containerWidth = track.parentElement?.clientWidth || window.innerWidth;
          const distance = containerWidth + track.scrollWidth;
          const duration = distance > 0 ? distance / speed : 1;
          track.style.setProperty("--marquee-duration", duration + "s");
        });
      }

      function scrollToSection(section) {
        if (!section) {
          return;
        }

        landingScrollLocked = true;
        section.scrollIntoView({ behavior: "smooth", block: "start" });

        window.setTimeout(() => {
          landingScrollLocked = false;
        }, 900);
      }

      function clearLandingScrollTransition() {
        if (landingScrollTransitionTimer) {
          window.clearTimeout(landingScrollTransitionTimer);
          landingScrollTransitionTimer = null;
        }
      }

      function skipVideoToEnd() {
        if (!birthVideo) {
          return false;
        }

        const safeDuration = Number.isFinite(birthVideo.duration) && birthVideo.duration > 0
          ? birthVideo.duration
          : Number.isFinite(birthVideo.seekable?.end?.(0))
            ? birthVideo.seekable.end(0)
            : 0;

        if (safeDuration <= 0) {
          return false;
        }

        const targetTime = Math.max(safeDuration - 0.08, 0);
        birthVideo.currentTime = targetTime;
        birthVideo.pause();
        birthVideoEndedPreview = true;
        return true;
      }

      function isVideoAtEnd() {
        if (birthVideoEndedPreview) {
          return true;
        }

        if (!birthVideo || Number.isNaN(birthVideo.duration) || birthVideo.duration <= 0) {
          return false;
        }

        return birthVideo.currentTime >= birthVideo.duration - 0.12;
      }

      function resetVideo() {
        if (!birthVideo) {
          return;
        }

        clearLandingScrollTransition();
        birthVideoEndedPreview = false;
        birthVideo.currentTime = 0;
        birthVideo.playbackRate = 3;
        const playAttempt = birthVideo.play();
        if (playAttempt && typeof playAttempt.catch === "function") {
          playAttempt.catch(() => {});
        }
      }

      function queueLandingTransition(section, delay) {
        clearLandingScrollTransition();
        landingScrollTransitionTimer = window.setTimeout(() => {
          landingScrollTransitionTimer = null;
          scrollToSection(section);
        }, delay);
      }

      function isSectionInView(section) {
        if (!section) {
          return false;
        }

        const rect = section.getBoundingClientRect();
        return rect.top <= window.innerHeight * 0.35 && rect.bottom >= window.innerHeight * 0.35;
      }

      function handleLandingAdvance(trigger) {
        if (landingScrollLocked) {
          return;
        }

        if (isSectionInView(videoLanding)) {
          if (trigger === "scroll") {
            const skipped = skipVideoToEnd();
            queueLandingTransition(letterLanding, skipped ? 420 : 120);
            return;
          }

          if (isVideoAtEnd()) {
            scrollToSection(letterLanding);
            return;
          }

          if (!skipVideoToEnd()) {
            scrollToSection(letterLanding);
          }
          return;
        }

        if (isSectionInView(letterLanding)) {
          scrollToSection(invitationContent);
        }
      }

      function handleLandingWheel(event) {
        if (event.deltaY <= 10) {
          return;
        }

        if (isSectionInView(videoLanding) || isSectionInView(letterLanding)) {
          event.preventDefault();
          handleLandingAdvance("scroll");
        }
      }

      function handleLandingTouchStart(event) {
        if (event.touches && event.touches.length > 0) {
          touchStartY = event.touches[0].clientY;
        }
      }

      function handleLandingTouchEnd(event) {
        if (!event.changedTouches || event.changedTouches.length === 0) {
          return;
        }

        const touchEndY = event.changedTouches[0].clientY;
        const deltaY = touchStartY - touchEndY;
        if (deltaY > 30 && (isSectionInView(videoLanding) || isSectionInView(letterLanding))) {
          handleLandingAdvance("scroll");
        }
      }

      function handleLandingClick(event) {
        const interactiveElement = event.target.closest("button, a, input, label");
        if (interactiveElement) {
          return;
        }

        if (isSectionInView(videoLanding) || isSectionInView(letterLanding)) {
          handleLandingAdvance("click");
        }
      }

      if (birthVideo) {
        birthVideo.playbackRate = 3;
        birthVideo.addEventListener("loadedmetadata", () => {
          birthVideo.playbackRate = 3;
        });
      }

      function updateGiftCount() {
        const selectedCount = document.querySelectorAll('.gift-option input:checked').length;
        const giftCount = document.getElementById("gift-count");
        if (giftCount) {
          giftCount.textContent = selectedCount + "개";
        }
      }

      document.querySelectorAll('.gift-option input').forEach((input) => {
        input.addEventListener("change", updateGiftCount);
      });

      updateGiftCount();

      if (continueButton) {
        continueButton.addEventListener("click", () => {
          scrollToSection(letterLanding);
        });
      }

      document.addEventListener("click", handleLandingClick);
      window.addEventListener("wheel", handleLandingWheel, { passive: false });
      window.addEventListener("touchstart", handleLandingTouchStart, { passive: true });
      window.addEventListener("touchend", handleLandingTouchEnd, { passive: true });
      window.addEventListener("resize", updateMarqueeSpeeds);
      window.addEventListener("resize", resizeOverviewHearts);
      window.addEventListener("scroll", () => {
        if (window.scrollY < window.innerHeight * 0.35) {
          resetVideo();
        }
      }, { passive: true });

      updateMarqueeSpeeds();
      startOverviewHeartAnimation();
      resetVideo();
    </script>
  </body>
</html>

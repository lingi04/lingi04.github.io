<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>해린이 첫돌 초대장</title>
    <style>
      @font-face {
        font-family: "NanumBarunGothic";
        src: url("//cdn.jsdelivr.net/font-nanumlight/1.0/NanumBarunGothicWeb.eot");
        font-weight: 400;
        font-display: swap;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        font-family: "NanumBarunGothic", "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
        background: #ffffff;
        color: #111111;
      }

      .landing {
        min-height: 100svh;
        display: flex;
        align-items: stretch;
        justify-content: center;
        background: #ffffff;
      }

      .container {
        width: min(100%, 1440px);
      }

      .landing-shell {
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 18px 16px 22px;
        background: #ffffff;
      }

      .landing-bottom {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .landing-stage {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 0;
        padding: 14px 0;
      }

      .landing-media {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
      }

      .landing-media img {
        display: block;
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
        object-fit: contain;
      }

      .landing-letter-media {
        height: min(88svh, 1080px);
      }

      @media (min-width: 740px) {
        .landing-shell {
          padding: 22px 28px 26px;
        }
      }
    </style>
  </head>
  <body>
    <section class="landing">
      <div class="container">
        <div class="landing-shell">
          <div class="landing-stage">
            <div class="landing-media landing-letter-media">
              <img src="./_resource/landing_letter.jpg" alt="랜딩 편지 이미지" />
            </div>
          </div>

          <div class="landing-bottom"></div>
        </div>
      </div>
    </section>

    <script>
      let touchStartY = 0;
      let navigating = false;

      function goNextPage() {
        if (navigating) {
          return;
        }

        navigating = true;
        window.location.href = "./menu.html";
      }

      function goPreviousPage() {
        if (navigating) {
          return;
        }

        navigating = true;
        window.location.href = "./index.html";
      }

      window.addEventListener("wheel", (event) => {
        if (Math.abs(event.deltaY) <= 10) {
          return;
        }

        event.preventDefault();

        if (event.deltaY > 0) {
          goNextPage();
          return;
        }

        goPreviousPage();
      }, { passive: false });

      window.addEventListener("touchstart", (event) => {
        if (event.touches.length > 0) {
          touchStartY = event.touches[0].clientY;
        }
      }, { passive: true });

      window.addEventListener("touchend", (event) => {
        if (!event.changedTouches || event.changedTouches.length === 0) {
          return;
        }

        const deltaY = touchStartY - event.changedTouches[0].clientY;
        if (Math.abs(deltaY) <= 30) {
          return;
        }

        if (deltaY > 0) {
          goNextPage();
          return;
        }

        goPreviousPage();
      }, { passive: true });
    </script>
  </body>
</html>

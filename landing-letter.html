<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>해린이 첫돌 초대장</title>
    <style>
      @font-face {
        font-family: "NanumBarunGothic";
        src: url("//cdn.jsdelivr.net/font-nanumlight/1.0/NanumBarunGothicWeb.eot");
        font-weight: 400;
        font-display: swap;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        font-family: "NanumBarunGothic", "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
        background: #ffffff;
        color: #111111;
      }

      .landing {
        min-height: 100svh;
        display: flex;
        align-items: stretch;
        justify-content: center;
        background: #ffffff;
      }

      .container {
        width: min(100%, 1440px);
      }

      .landing-shell {
        position: relative;
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        padding: 18px 16px 22px;
        background: #ffffff;
      }

      .landing-bottom {
        position: absolute;
        right: 16px;
        bottom: 22px;
        display: none;
        justify-content: flex-end;
      }

      .landing-shell.show-landing-bottom .landing-bottom {
        display: flex;
      }

      .click-cue {
        margin-left: auto;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 10px 14px;
        border: 1px solid rgba(17, 17, 17, 0.08);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.88);
        color: rgba(17, 17, 17, 0.76);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
        box-shadow: 0 10px 24px rgba(17, 17, 17, 0.08);
        pointer-events: none;
      }

      .click-cue-icon {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: rgba(17, 17, 17, 0.06);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        animation: click-cue-pulse 1.5s ease-in-out infinite;
      }

      @keyframes click-cue-pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 0.8;
        }

        50% {
          transform: scale(1.08);
          opacity: 1;
        }
      }

      .landing-stage {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 0;
        padding: 14px 0;
      }

      .landing-media {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
      }

      .landing-media img {
        display: block;
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
        object-fit: contain;
      }

      .landing-letter-media {
        height: min(88svh, 1080px);
      }

      @media (min-width: 740px) {
        .landing-shell {
          padding: 22px 28px 26px;
        }

        .landing-bottom {
          right: 28px;
          bottom: 26px;
        }

        .click-cue {
          font-size: 13px;
        }
      }
    </style>
  </head>
  <body>
    <section class="landing">
      <div class="container">
        <div class="landing-shell">
          <div class="landing-stage">
            <div class="landing-media landing-letter-media">
              <img src="./_resource/landing_letter.jpg" alt="랜딩 편지 이미지" />
            </div>
          </div>

          <div class="landing-bottom">
            <div class="click-cue" aria-hidden="true">
              <span class="click-cue-icon">✦</span>
              <span>스크롤하거나 클릭해 다음으로</span>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script>
      let touchStartY = 0;
      let navigating = false;

      function goNextPage() {
        if (navigating) {
          return;
        }

        navigating = true;
        window.location.href = "./menu.html";
      }

      function goPreviousPage() {
        if (navigating) {
          return;
        }

        navigating = true;
        window.location.href = "./index.html";
      }

      function isInteractiveTarget(target) {
        return Boolean(target?.closest("a, button, input, label"));
      }

      document.addEventListener("click", (event) => {
        if (isInteractiveTarget(event.target)) {
          return;
        }

        goNextPage();
      });

      window.addEventListener("wheel", (event) => {
        if (Math.abs(event.deltaY) <= 10) {
          return;
        }

        event.preventDefault();

        if (event.deltaY > 0) {
          goNextPage();
          return;
        }

        goPreviousPage();
      }, { passive: false });

      window.addEventListener("touchstart", (event) => {
        if (event.touches.length > 0) {
          touchStartY = event.touches[0].clientY;
        }
      }, { passive: true });

      window.addEventListener("touchend", (event) => {
        if (!event.changedTouches || event.changedTouches.length === 0) {
          return;
        }

        const deltaY = touchStartY - event.changedTouches[0].clientY;
        if (Math.abs(deltaY) <= 30) {
          return;
        }

        if (deltaY > 0) {
          goNextPage();
          return;
        }

        goPreviousPage();
      }, { passive: true });
    </script>
  </body>
</html>

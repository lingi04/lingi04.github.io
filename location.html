<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>해린이 첫돌 초대장 · 장소 설명</title>
    <style>
      @font-face {
        font-family: "NanumBarunGothic";
        src: url("//cdn.jsdelivr.net/font-nanumlight/1.0/NanumBarunGothicWeb.eot");
        font-weight: 400;
        font-display: swap;
      }

      @font-face {
        font-family: "NanumBarunGothic";
        src: url("//cdn.jsdelivr.net/font-nanumlight/1.0/NanumBarunGothicWebBold.eot");
        font-weight: 700;
        font-display: swap;
      }

      @font-face {
        font-family: "NanumBarunGothic";
        src: url("//cdn.jsdelivr.net/font-nanumlight/1.0/NanumBarunGothicWebLight.eot");
        font-weight: 300;
        font-display: swap;
      }

      * { box-sizing: border-box; }
      :root {
        --line: #000000;
        --pink: #ff39d1;
        --mint: #71ffae;
        --lavender: #f3b4ff;
        --cream: #fff9d7;
        --white: #ffffff;
        --ink-soft: #2a2a2a;
        --font-body: "NanumBarunGothic", "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
      }
      body {
        margin: 0;
        font-family: var(--font-body);
        line-height: 1.5;
        word-break: keep-all;
        color: #000000;
        background: #ffffff;
      }
      a { color: inherit; text-decoration: none; }
      h1, h2, p { margin: 0; }
      .page { width: 100%; }
      .shell {
        width: min(100%, 980px);
        margin: 0 auto;
        background: #ffffff;
      }
      .hero {
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-height: 150px;
        padding: 28px 22px 24px;
        background: linear-gradient(135deg, #fff7d2 0%, #fffdf4 100%);
        border-bottom: 4px solid var(--line);
      }
      .title {
        max-width: 820px;
        font-size: clamp(46px, 9vw, 96px);
        line-height: 0.94;
        letter-spacing: -0.06em;
        font-weight: 900;
      }
      .back {
        display: inline-flex;
        margin-top: 18px;
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .content {
        display: grid;
        gap: 0;
      }
      .section-block {
        padding: 16px 18px;
        border-bottom: 4px solid var(--line);
      }
      .section-block:last-child {
        border-bottom: 0;
      }
      .section-head {
        margin-bottom: 10px;
      }
      .info-list {
        border-top: 1px solid var(--line);
      }
      .info-row {
        display: grid;
        gap: 10px;
        padding: 12px 0;
        border-bottom: 1px solid var(--line);
      }
      .info-detail {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 128px;
        align-items: start;
        gap: 10px;
      }
      .card-label {
        display: block;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }
      .meta-list {
        border-top: 1px solid var(--line);
      }
      .meta-row {
        display: grid;
        gap: 8px;
        padding: 16px 0;
        border-bottom: 1px solid rgba(0, 0, 0, 0.85);
      }
      .meta-value {
        max-width: 640px;
        font-size: 16px;
        line-height: 1.24;
        letter-spacing: -0.03em;
        font-weight: 800;
      }
      .section-head .card-label,
      .map-heading .card-label {
        font-size: 15px;
      }
      .info-row .meta-value {
        font-size: clamp(20px, 4.2vw, 28px);
        line-height: 1.06;
      }
      .meta-row .meta-value {
        font-size: 16px;
        line-height: 1.35;
      }
      .map-section {
        background: linear-gradient(135deg, #ffffff 0%, #fbfff7 100%);
      }
      .map-heading {
        margin-bottom: 16px;
      }
      .map-frame {
        overflow: hidden;
        border: 4px solid var(--line);
        background: #ffffff;
      }
      .map-frame iframe {
        display: block;
        width: 100%;
        height: 320px;
        border: 0;
      }
      .actions {
        display: grid;
        gap: 8px;
      }
      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 34px;
        padding: 4px 8px;
        border: 1px solid var(--line);
        background: #111111;
        color: #ffffff;
        font-size: 12px;
        font-weight: 800;
        text-align: center;
      }
      .button.secondary {
        background: #ffffff;
        color: #111111;
      }
      @media (min-width: 780px) {
        .hero {
          padding: 28px 22px 24px;
        }
        .info-row {
          grid-template-columns: 140px minmax(0, 1fr);
          align-items: start;
        }
        .info-row.address-row .actions {
          justify-self: end;
          width: 128px;
        }
        .meta-row {
          grid-template-columns: 140px minmax(0, 1fr);
          align-items: center;
        }
        .section-head .card-label,
        .map-heading .card-label {
          font-size: 16px;
        }
        .info-row .meta-value {
          font-size: clamp(22px, 2.5vw, 30px);
        }
        .meta-row .meta-value {
          font-size: 17px;
        }
        .map-frame iframe {
          height: 420px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="shell">
        <section class="hero">
          <h1 class="title">오시는 길</h1>
          <a class="back" href="./index.html#invitation-content">Back to menu</a>
        </section>

        <div class="content">
          <section class="section-block">
            <div class="section-head">
              <span class="card-label">Essential Info</span>
            </div>
            <div class="info-list">
              <article class="info-row">
                <span class="card-label">Date</span>
                <p class="meta-value">2026년 5월 17일<br />일요일 오전 11시</p>
              </article>
              <article class="info-row">
                <span class="card-label">VENUE</span>
                <p class="meta-value">바이탈<br />바이브</p>
              </article>
              <article class="info-row address-row">
                <span class="card-label">Address</span>
                <div class="info-detail">
                  <p class="meta-value">서울 강남구<br />밤고개로34길 14 2층</p>
                  <div class="actions">
                    <a class="button" href="https://map.kakao.com/link/map/바이탈바이브,37.463781,127.106746" target="_blank" rel="noreferrer">카카오맵</a>
                    <a class="button secondary" href="https://map.naver.com/p/search/%EB%B0%94%EC%9D%B4%ED%83%88%20%EB%B0%94%EC%9D%B4%EB%B8%8C" target="_blank" rel="noreferrer">네이버지도</a>
                  </div>
                </div>
              </article>
            </div>
          </section>

          <section class="section-block map-section">
            <div class="map-heading">
              <span class="card-label">Map</span>
            </div>
            <div class="map-frame">
              <iframe
                title="바이탈 바이브 지도"
                src="https://maps.google.com/maps?q=37.46375,127.10675&amp;t=&amp;z=16&amp;ie=UTF8&amp;iwloc=&amp;output=embed"
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"
              ></iframe>
            </div>
          </section>

          <section class="section-block">
            <div class="section-head">
              <span class="card-label">Visit Notes</span>
            </div>
            <div class="meta-list">
              <article class="meta-row">
                <span class="card-label">Parking</span>
                <p class="meta-value">주차 정보 확인 중</p>
              </article>
              <article class="meta-row">
                <span class="card-label">Transit</span>
                <p class="meta-value">대중교통 안내 추가 예정</p>
              </article>
              <article class="meta-row">
                <span class="card-label">Guide</span>
                <p class="meta-value">아래 지도 앱 버튼으로 바로 길찾기 가능</p>
              </article>
            </div>
          </section>
        </div>
      </div>
    </main>
  </body>
</html>

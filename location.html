<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>해린이 첫돌 초대장 · 장소 설명</title>
    <style>
      * { box-sizing: border-box; }
      body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif; background: #fff; color: #000; }
      a { color: inherit; text-decoration: none; }
      h1, p, div { margin: 0; }
      .hero, .info-header { padding: 28px 22px; }
      .hero { background: linear-gradient(135deg, #fff 0%, #ffd2f6 100%); border-bottom: 8px solid #000; }
      .eyebrow { display: block; margin-bottom: 14px; font-size: 12px; font-weight: 800; letter-spacing: 0.14em; text-transform: uppercase; }
      .title { max-width: 820px; font-size: clamp(46px, 9vw, 96px); line-height: 0.94; letter-spacing: -0.06em; font-weight: 900; }
      .back { display: inline-flex; margin-top: 18px; font-size: 13px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; }
      .details-grid { display: grid; border-top: 8px solid #000; }
      .details-row { display: grid; grid-template-columns: 110px 1fr; gap: 16px; padding: 22px; border-bottom: 8px solid #000; }
      .details-label { font-size: 12px; font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase; }
      .details-grid > div:first-child .details-row:nth-child(odd),
      .details-grid > div:last-child .details-row:nth-child(even) { background: #73ffb0; }
      .details-grid > div:first-child .details-row:nth-child(even),
      .details-grid > div:last-child .details-row:nth-child(odd) { background: #ff39d1; }
      .map-box { border-bottom: 8px solid #000; }
      .map-box iframe { display: block; width: 100%; height: 320px; border: 0; }
      .actions { display: grid; gap: 10px; padding: 22px; }
      .button { display: inline-flex; justify-content: center; align-items: center; min-height: 52px; padding: 12px 20px; border-radius: 999px; background: #111; color: #fff; font-weight: 700; }
      .button.secondary { background: #fff; color: #111; border: 1px solid rgba(17,17,17,.16); }
      @media (min-width: 740px) { .details-grid { grid-template-columns: 1fr 1fr; } .actions { grid-template-columns: 1fr 1fr; } }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <span class="eyebrow">Information</span>
        <h1 class="title">잔치 정보와 오시는 길.</h1>
        <a class="back" href="./index.html#invitation-content">Back to menu</a>
      </section>
      <section class="details-grid">
        <div>
          <div class="details-row"><div class="details-label">Date</div><div>2026년 5월 17일 일요일 오전 11시</div></div>
          <div class="details-row"><div class="details-label">Venue</div><div>바이탈 바이브</div></div>
          <div class="details-row"><div class="details-label">Address</div><div>서울 강남구 밤고개로34길 14 2층</div></div>
        </div>
        <div>
          <div class="details-row"><div class="details-label">Parking</div><div>주차 정보는 현재 확인 중이며, 확정되면 이 문구만 바로 교체하면 됩니다.</div></div>
          <div class="details-row"><div class="details-label">Transit</div><div>가까운 역이나 버스 정보는 장소 확인 후 추가하기 좋게 자리만 남겨두었습니다.</div></div>
          <div class="details-row"><div class="details-label">Guide</div><div>지도와 외부 링크는 아래에서 바로 확인하실 수 있어요.</div></div>
        </div>
      </section>
      <section class="map-box">
        <iframe
          title="바이탈 바이브 지도"
          src="https://maps.google.com/maps?q=37.463781,127.106746&amp;t=&amp;z=16&amp;ie=UTF8&amp;iwloc=&amp;output=embed"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
        ></iframe>
      </section>
      <section class="actions">
        <a class="button" href="https://map.kakao.com/link/map/바이탈바이브,37.463781,127.106746" target="_blank" rel="noreferrer">카카오맵 열기</a>
        <a class="button secondary" href="https://map.naver.com/p/search/%EB%B0%94%EC%9D%B4%ED%83%88%20%EB%B0%94%EC%9D%B4%EB%B8%8C" target="_blank" rel="noreferrer">네이버지도 열기</a>
      </section>
    </main>
  </body>
</html>

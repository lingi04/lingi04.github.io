<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>해린이 첫돌 초대장 · 장소 설명</title>
    <link rel="stylesheet" href="./shared-header.css" />
    <style>
      @font-face {
        font-family: "NanumBarunGothic";
        src: url("//cdn.jsdelivr.net/font-nanumlight/1.0/NanumBarunGothicWeb.eot");
        font-weight: 400;
        font-display: swap;
      }

      @font-face {
        font-family: "NanumBarunGothic";
        src: url("//cdn.jsdelivr.net/font-nanumlight/1.0/NanumBarunGothicWebBold.eot");
        font-weight: 700;
        font-display: swap;
      }

      @font-face {
        font-family: "NanumBarunGothic";
        src: url("//cdn.jsdelivr.net/font-nanumlight/1.0/NanumBarunGothicWebLight.eot");
        font-weight: 300;
        font-display: swap;
      }

      * { box-sizing: border-box; }
      :root {
        --line: #000000;
        --pink: #ff39d1;
        --mint: #71ffae;
        --lavender: #f3b4ff;
        --cream: #fff9d7;
        --white: #ffffff;
        --ink-soft: #2a2a2a;
        --shared-hero-bg: #fff5b0;
        --font-body: "NanumBarunGothic", "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
      }
      body {
        margin: 0;
        font-family: var(--font-body);
        line-height: 1.5;
        word-break: keep-all;
        color: #000000;
        background: #ffffff;
      }
      a { color: inherit; text-decoration: none; }
      h1, h2, p { margin: 0; }
      .page { width: 100%; }
      .shell {
        width: min(100%, 980px);
        margin: 0 auto;
        background: #ffffff;
      }
      .title {
        padding: 22px 22px 0;
      }
      .content {
        display: grid;
        gap: 0;
      }
      .section-block {
        padding: 16px 18px;
      }
      .map-section {
        background: linear-gradient(135deg, #ffffff 0%, #fbfff7 100%);
      }
      .map-frame {
        overflow: hidden;
        background: #ffffff;
      }
      .map-frame iframe {
        display: block;
        width: 100%;
        height: 320px;
        border: 0;
      }
      .location-copy {
        display: grid;
        gap: 18px;
        padding-top: 1px;
      }
      .location-copy p {
        font-family: "CAChildrenModu", "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
        font-size: 18px;
        line-height: 1.7;
        letter-spacing: -0.02em;
      }
      .location-copy .venue-name {
        font-family: "NostalgicPoliceFairness", "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
        font-size: clamp(34px, 7vw, 52px);
        line-height: 1.05;
        font-weight: 900;
        letter-spacing: -0.04em;
      }
      .location-copy .lead {
        font-size: clamp(20px, 4.6vw, 30px);
        line-height: 1.35;
        font-weight: 800;
      }
      @media (min-width: 780px) {
        .map-frame iframe {
          height: 420px;
        }
        .location-copy p {
          font-size: 20px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="shell">
        <section class="hero shared-hero" data-shared-menu>
          <button class="shared-hero-toggle" data-shared-menu-button type="button" aria-expanded="false" aria-controls="location-shared-menu">MENU</button>
          <div class="shared-hero-menu" id="location-shared-menu" data-shared-menu-panel>
            <a href="./menu.html">메인으로</a>
            <a href="./diary.html">해린이에 대하여</a>
            <a href="./album.html">시크릿 사진첩</a>
            <a href="./wishlist.html">선물 리스트</a>
            <a href="./location.html">오시는길</a>
          </div>
        </section>
        <h1 class="title shared-title">오시는 길</h1>

        <div class="content">
          <section class="section-block map-section">
            <div class="map-frame">
              <iframe
                title="바이탈 바이브 지도"
                src="https://maps.google.com/maps?q=37.46375,127.10675&amp;t=&amp;z=16&amp;ie=UTF8&amp;iwloc=&amp;output=embed"
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade"
              ></iframe>
            </div>
          </section>

          <section class="section-block">
            <div class="location-copy">
              <p class="venue-name">바이탈 바이브</p>
              <p class="lead">2026년 5월 17일 일요일, 오전 11시-2시<br />서울 강남구 밤고개로 34길 14, 2층</p>
              <p>가족들만 참여하는 식사자리입니다.<br />특별한 진행자도없고, 초대가수도 없지만 와주셔서<br />해린이의 첫돌을 축하해 주세요.<br />대신 맛있는 음식과 귀여운 해린이의 모습으로<br />행복을 드리겠습니다.<br />늦지 않게 뵙겠습니다. 사랑합니다♡♡♡♡</p>
            </div>
          </section>
        </div>
      </div>
    </main>
    <script src="./shared-header.js"></script>
  </body>
</html>

<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>해린이 첫돌 초대장 · 돌 선물 리스트</title>
    <link rel="stylesheet" href="./shared-header.css" />
    <style>
      @font-face {
        font-family: "NanumBarunGothic";
        src: url("//cdn.jsdelivr.net/font-nanumlight/1.0/NanumBarunGothicWeb.eot");
        font-weight: 400;
        font-display: swap;
      }

      @font-face {
        font-family: "NanumBarunGothic";
        src: url("//cdn.jsdelivr.net/font-nanumlight/1.0/NanumBarunGothicWebBold.eot");
        font-weight: 700;
        font-display: swap;
      }

      @font-face {
        font-family: "NanumBarunGothic";
        src: url("//cdn.jsdelivr.net/font-nanumlight/1.0/NanumBarunGothicWebLight.eot");
        font-weight: 300;
        font-display: swap;
      }

      * { box-sizing: border-box; }

      :root {
        --line: #000000;
        --mint: #73ffb0;
        --pink: #ff39d1;
        --lavender: #f4c6ff;
        --cream: #fff7ca;
        --sky: #dff6ff;
        --white: #ffffff;
        --shared-hero-bg: #d2fc4f;
        --font-body: "NanumBarunGothic", "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
      }

      body {
        margin: 0;
        font-family: var(--font-body);
        background: #ffffff;
        color: #000000;
      }

      main {
        min-height: 100svh;
        display: flex;
        flex-direction: column;
      }

      a { color: inherit; text-decoration: none; }
      h1, h2, p, strong, span { margin: 0; }

      .title {
        padding: 22px 22px 0;
      }

      .lead {
        max-width: 620px;
        margin: 14px auto 0;
        padding: 0 22px;
        font-size: 17px;
        line-height: 1.55;
        font-weight: 700;
        text-align: center;
      }

      .wishlist-shell {
        flex: 1;
        display: flex;
        min-height: 0;
      }

      .wishlist-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-auto-rows: 1fr;
        flex: 1;
        width: 100%;
        min-height: 0;
        gap: 0;
      }

      .gift-option {
        position: relative;
      }

      .gift-option input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
      }

      .gift-card {
        display: block;
        min-height: 0;
        border-bottom: 4px solid var(--line);
        background: var(--white);
        cursor: pointer;
      }

      .gift-card-inner {
        position: relative;
        display: grid;
        min-height: 0;
      }

      .gift-media {
        position: relative;
        aspect-ratio: 1 / 1;
        overflow: hidden;
        background: #f5f5f5;
      }

      .gift-media img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .gift-index {
        position: absolute;
        left: 14px;
        top: 14px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 42px;
        height: 42px;
        border: 2px solid var(--line);
        background: rgba(255, 255, 255, 0.92);
        font-size: 14px;
        font-weight: 900;
      }

      .gift-copy {
        padding: 14px 14px 16px;
        background: transparent;
      }

      .gift-topline {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
      }

      .gift-name {
        font-size: clamp(20px, 5.6vw, 44px);
        line-height: 0.95;
        letter-spacing: -0.05em;
        font-weight: 900;
      }

      .gift-tag {
        display: inline-flex;
        padding: 6px 10px;
        border: 2px solid var(--line);
        background: var(--white);
        font-size: 11px;
        font-weight: 900;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .gift-desc {
        margin-top: 12px;
        font-size: 13px;
        line-height: 1.55;
        font-weight: 700;
      }

      .gift-note {
        display: inline-flex;
        margin-top: 14px;
        padding: 8px 11px;
        border: 2px solid var(--line);
        background: rgba(255, 255, 255, 0.86);
        font-size: 11px;
        font-weight: 900;
      }

      .gift-option:nth-child(4n + 1) .gift-card { background: linear-gradient(135deg, #fff6cd 0%, #fffdf4 100%); }
      .gift-option:nth-child(4n + 2) .gift-card { background: linear-gradient(135deg, #ffb9e8 0%, #ffe5f7 100%); }
      .gift-option:nth-child(4n + 3) .gift-card { background: linear-gradient(135deg, #bdf6d2 0%, #effff6 100%); }
      .gift-option:nth-child(4n + 4) .gift-card { background: linear-gradient(135deg, #fff1b8 0%, #fffdf0 100%); }

      .gift-option input:checked + .gift-card .gift-media {
        box-shadow: inset 0 0 0 10px rgba(0, 0, 0, 0.18);
      }

      .gift-option input:checked + .gift-card .gift-tag {
        background: #111111;
        color: #ffffff;
      }

      @media (hover: hover) and (pointer: fine) {
        .gift-copy {
          opacity: 0;
          transform: translateY(14px);
          pointer-events: none;
          position: absolute;
          inset: auto 0 0 0;
          background: linear-gradient(180deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.72) 24%, rgba(255, 255, 255, 0.92) 100%);
          transition: opacity 0.22s ease, transform 0.22s ease;
        }

        .gift-card:hover .gift-copy,
        .gift-card:focus-within .gift-copy {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 819px) {
        main {
          display: block;
          min-height: auto;
        }

        .wishlist-shell {
          display: block;
          flex: none;
        }

        .wishlist-grid {
          grid-auto-rows: auto;
          min-height: auto;
        }

        .gift-card,
        .gift-card-inner {
          min-height: auto;
          height: auto;
        }

        .gift-media {
          aspect-ratio: 1 / 0.8;
          height: auto;
          overflow: hidden;
        }

        .gift-media img {
          aspect-ratio: 1 / 0.8;
          height: 100%;
        }

        .gift-option:nth-child(odd) .gift-card {
          border-right: 4px solid var(--line);
        }

        .gift-option:nth-last-child(-n + 2) .gift-card {
          border-bottom: 0;
        }

        .gift-topline {
          flex-direction: column;
          gap: 8px;
        }

        .gift-copy {
          padding: 14px 14px 16px;
        }

        .gift-tag {
          font-size: 10px;
          padding: 5px 8px;
        }
      }

      @media (min-width: 820px) {
        .wishlist-grid {
          grid-template-columns: 1fr 1fr;
          grid-template-rows: repeat(2, minmax(0, 1fr));
          min-height: calc(100svh - 214px);
        }

        .gift-option:nth-child(odd) .gift-card {
          border-right: 4px solid var(--line);
        }

        .gift-option:nth-last-child(-n + 2) .gift-card {
          border-bottom: 0;
        }

        .gift-card-inner {
          grid-template-rows: minmax(0, 1fr);
          height: 100%;
        }

        .gift-media {
          height: 100%;
          aspect-ratio: auto;
        }

        .gift-copy {
          padding: 22px 22px 24px;
        }

        .gift-name {
          font-size: clamp(34px, 3.8vw, 56px);
        }

        .gift-desc {
          max-width: 28ch;
          font-size: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero shared-hero" data-shared-menu>
        <button class="shared-hero-toggle" data-shared-menu-button type="button" aria-expanded="false" aria-controls="wishlist-shared-menu">MENU</button>
        <div class="shared-hero-menu" id="wishlist-shared-menu" data-shared-menu-panel>
          <a href="./diary.html">해린이에 대하여</a>
          <a href="./album.html">시크릿 사진첩</a>
          <a href="./wishlist.html">선물 리스트</a>
          <a href="./location.html">오시는길</a>
        </div>
      </section>
      <h1 class="title shared-title">위시리스트</h1>
      <p class="lead">해린이를 위해 준비해 주시는 마음만으로도 충분히 감사합니다. 필요하신 분들을 위해 선물 후보를 정리해 두었습니다.</p>

      <section class="wishlist-shell">
        <div class="wishlist-grid">
          <div class="gift-option">
            <input id="gift-clothes" type="checkbox" />
            <label class="gift-card" for="gift-clothes">
              <div class="gift-card-inner">
                <div class="gift-media">
                  <img src="./_resource/wishlist/clothes.jpeg" alt="아기 옷 선물 이미지" />
                  <span class="gift-index">01</span>
                </div>
                <div class="gift-copy">
                  <div class="gift-topline">
                    <strong class="gift-name">외출복</strong>
                    <span class="gift-tag">Daily</span>
                  </div>
                  <p class="gift-desc">자주 입기 좋은 편한 옷이 있으면 오래 잘 입을 것 같아요. 계절감 맞는 90 사이즈면 특히 좋습니다.</p>
                  <span class="gift-note">편하게 오래 입는 선물</span>
                </div>
              </div>
            </label>
          </div>

          <div class="gift-option">
            <input id="gift-stroller" type="checkbox" />
            <label class="gift-card" for="gift-stroller">
              <div class="gift-card-inner">
                <div class="gift-media">
                  <img src="./_resource/wishlist/stroller.webp" alt="유모차 선물 이미지" />
                  <span class="gift-index">02</span>
                </div>
                <div class="gift-copy">
                  <div class="gift-topline">
                    <strong class="gift-name">유모차</strong>
                    <span class="gift-tag">Outdoor</span>
                  </div>
                  <p class="gift-desc">외출할 때 자주 쓰는 아이템이라 실용성이 높아요. 가볍고 다루기 편한 쪽을 생각하고 있습니다.</p>
                  <span class="gift-note">밖에 나갈 때 늘 함께</span>
                </div>
              </div>
            </label>
          </div>

          <div class="gift-option">
            <input id="gift-shoes" type="checkbox" />
            <label class="gift-card" for="gift-shoes">
              <div class="gift-card-inner">
                <div class="gift-media">
                  <img src="./_resource/wishlist/shoose.webp" alt="아기 신발 선물 이미지" />
                  <span class="gift-index">03</span>
                </div>
                <div class="gift-copy">
                  <div class="gift-topline">
                    <strong class="gift-name">신발</strong>
                    <span class="gift-tag">Walk</span>
                  </div>
                  <p class="gift-desc">첫걸음마에 잘 맞는 가벼운 신발도 좋아요. 발이 편하고 자주 신게 되는 디자인이면 더 좋습니다.</p>
                  <span class="gift-note">가볍고 편한 착용감</span>
                </div>
              </div>
            </label>
          </div>

          <div class="gift-option">
            <input id="gift-toy" type="checkbox" />
            <label class="gift-card" for="gift-toy">
              <div class="gift-card-inner">
                <div class="gift-media">
                  <img src="./_resource/wishlist/toy.jpg" alt="장난감 선물 이미지" />
                  <span class="gift-index">04</span>
                </div>
                <div class="gift-copy">
                  <div class="gift-topline">
                    <strong class="gift-name">장난감</strong>
                    <span class="gift-tag">Play</span>
                  </div>
                  <p class="gift-desc">반복해서 오래 가지고 놀 수 있는 장난감을 좋아해요. 단순하지만 자꾸 손이 가는 종류면 충분합니다.</p>
                  <span class="gift-note">보고 만지고 오래 노는 선물</span>
                </div>
              </div>
            </label>
          </div>
        </div>
      </section>

    </main>
    <script src="./shared-header.js"></script>
    <script>
      function updateGiftCount() {
        const selectedCount = document.querySelectorAll(".gift-option input:checked").length;
        const giftCount = document.getElementById("gift-count");
        if (giftCount) {
          giftCount.textContent = selectedCount + "개 선택";
        }
      }

      document.querySelectorAll(".gift-option input").forEach((input) => {
        input.addEventListener("change", updateGiftCount);
      });

      updateGiftCount();
    </script>
  </body>
</html>

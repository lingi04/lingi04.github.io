<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>해린이 첫돌 초대장 · 돌 선물 리스트</title>
    <link rel="stylesheet" href="./shared-header.css" />
    <style>
      @font-face {
        font-family: "NanumBarunGothic";
        src: url("//cdn.jsdelivr.net/font-nanumlight/1.0/NanumBarunGothicWeb.eot");
        font-weight: 400;
        font-display: swap;
      }

      @font-face {
        font-family: "NanumBarunGothic";
        src: url("//cdn.jsdelivr.net/font-nanumlight/1.0/NanumBarunGothicWebBold.eot");
        font-weight: 700;
        font-display: swap;
      }

      @font-face {
        font-family: "NanumBarunGothic";
        src: url("//cdn.jsdelivr.net/font-nanumlight/1.0/NanumBarunGothicWebLight.eot");
        font-weight: 300;
        font-display: swap;
      }

      * { box-sizing: border-box; }

      :root {
        --line: #000000;
        --mint: #73ffb0;
        --pink: #ff39d1;
        --lavender: #f4c6ff;
        --cream: #fff7ca;
        --sky: #dff6ff;
        --white: #ffffff;
        --shared-hero-bg: #d2fc4f;
        --font-body: "NanumBarunGothic", "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
      }

      body {
        margin: 0;
        font-family: var(--font-body);
        background: #d2fc4f;
        color: #000000;
        overflow: hidden;
      }

      main {
        height: 100svh;
        display: flex;
        flex-direction: column;
        background: #d2fc4f;
        overflow: hidden;
      }

      a { color: inherit; text-decoration: none; }
      h1, h2, p, strong, span { margin: 0; }

      .title {
        padding: 22px 22px 0;
      }

      .wishlist-poster {
        width: 100%;
        max-width: none;
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
        margin: 12px 0 0;
        padding: 0 22px 20px;
      }

      .wishlist-note {
        margin-top: 10px;
        padding: 0 4px;
        font-size: 12px;
        line-height: 1.55;
      }

      .wishlist-grid {
        display: grid;
        grid-template-columns: minmax(0, 6.6fr) minmax(0, 4.4fr);
        flex: 1;
        min-height: 0;
        margin-top: 12px;
        border: 1.5px solid rgba(0, 0, 0, 0.32);
        background: rgba(210, 252, 79, 0.36);
      }

      .wishlist-column {
        min-width: 0;
        min-height: 0;
      }

      .wishlist-column.left {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-template-rows: minmax(0, 1.15fr) minmax(0, 1.15fr) minmax(0, 0.8fr) minmax(0, 0.9fr);
      }

      .wishlist-column.right {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-template-rows: minmax(0, 1.05fr) minmax(0, 1.75fr) minmax(0, 1.2fr);
        border-left: 1.5px solid rgba(0, 0, 0, 0.32);
      }

      .wishlist-item {
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        gap: 8px;
        min-width: 0;
        padding: 10px 8px 8px;
      }

      .wishlist-item img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: center;
      }

      .wishlist-visual {
        flex: 1;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .wishlist-stack-visual {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr) auto;
        align-items: stretch;
        gap: 6px;
      }

      .wishlist-stack-header {
        display: flex;
        justify-content: flex-end;
      }

      .wishlist-stack-top {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0;
        min-height: 0;
        align-self: center;
      }

      .wishlist-stack-top img {
        width: 64%;
        height: auto;
        max-height: 100%;
      }

      .wishlist-stack-top img + img {
        margin-left: -18%;
      }

      .wishlist-stack-bottom {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        min-height: 0;
        align-self: end;
      }

      .wishlist-stack-bottom img {
        width: 100%;
        height: auto;
        max-height: 100%;
      }

      .wishlist-label {
        font-family: "CAChildrenModu", "Apple SD Gothic Neo", "Pretendard", "Noto Sans KR", sans-serif;
        font-size: 11px;
        line-height: 1.15;
        letter-spacing: -0.01em;
        word-break: keep-all;
      }

      .wishlist-item.large {
        grid-column: 1 / span 2;
        grid-row: span 2;
      }

      .wishlist-item.stroller {
        grid-column: 1 / span 2;
        grid-row: 1 / span 2;
      }

      .wishlist-item.books {
        grid-column: 1 / span 2;
        grid-row: 1;
        justify-content: flex-start;
        gap: 4px;
        padding-top: 10px;
        padding-bottom: 8px;
      }

      .wishlist-item.books .wishlist-visual {
        flex: 1;
        min-height: 0;
        align-items: center;
        justify-content: center;
      }

      .wishlist-item.books img {
        transform: scale(0.85);
        transform-origin: center;
      }

      .wishlist-item.stack {
        grid-column: 1 / span 2;
        grid-row: 2;
        justify-content: flex-start;
        border-top: 1.5px solid rgba(0, 0, 0, 0.32);
      }

      .wishlist-item.crocs {
        grid-column: 1;
        grid-row: 3;
        border-top: 1.5px solid rgba(0, 0, 0, 0.32);
      }

      .wishlist-item.pass {
        grid-column: 2;
        grid-row: 3;
        border-left: 1.5px solid rgba(0, 0, 0, 0.32);
        border-top: 1.5px solid rgba(0, 0, 0, 0.32);
      }

      .wishlist-item.money {
        grid-column: 1;
        grid-row: 4;
        border-top: 1.5px solid rgba(0, 0, 0, 0.32);
      }

      .wishlist-item.mic {
        grid-column: 2;
        grid-row: 4;
        border-left: 1.5px solid rgba(0, 0, 0, 0.32);
        border-top: 1.5px solid rgba(0, 0, 0, 0.32);
      }

      .wishlist-item.lumi {
        grid-column: 1 / span 2;
        grid-row: 3;
        border-top: 1.5px solid rgba(0, 0, 0, 0.32);
        justify-content: flex-start;
        padding-top: 8px;
      }

      .wishlist-item.lumi .wishlist-visual {
        flex: 1;
        min-height: 0;
        align-items: center;
        justify-content: center;
      }

      .wishlist-item.small {
        justify-content: flex-end;
      }

      .wishlist-item.large .wishlist-label,
      .wishlist-item.books .wishlist-label,
      .wishlist-item.stack .wishlist-label {
        font-size: 12px;
      }

      .wishlist-item.books .wishlist-label {
        width: 100%;
        text-align: right;
      }

      .wishlist-stack-header .wishlist-label {
        text-align: right;
      }

      .wishlist-item.lumi .wishlist-label {
        width: 100%;
        text-align: left;
      }

      @media (min-width: 740px) {
        .wishlist-poster {
          margin-top: 16px;
          padding: 0 28px 24px;
        }

        .wishlist-note {
          font-size: 13px;
        }

        .wishlist-label {
          font-size: 12px;
        }
      }

    </style>
  </head>
  <body>
    <main>
      <section class="hero shared-hero" data-shared-menu>
        <button class="shared-hero-toggle" data-shared-menu-button type="button" aria-expanded="false" aria-controls="wishlist-shared-menu">MENU</button>
        <div class="shared-hero-menu" id="wishlist-shared-menu" data-shared-menu-panel>
          <a href="./diary.html">해린이에 대하여</a>
          <a href="./album.html">시크릿 사진첩</a>
          <a href="./wishlist.html">선물 리스트</a>
          <a href="./location.html">오시는길</a>
        </div>
      </section>
      <h1 class="title shared-title">위시리스트</h1>

      <section class="wishlist-poster">
        <p class="wishlist-note">※ 선착순으로 찜할 수 있습니다.<br />주고싶은 선물을 카톡으로 알려주세요</p>

        <div class="wishlist-grid">
          <div class="wishlist-column left">
            <article class="wishlist-item large stroller">
              <div class="wishlist-visual">
                <img src="./_resource/wishlist/stroller.png" alt="휴대용 유모차" />
              </div>
              <p class="wishlist-label">휴대용유모차</p>
            </article>

            <article class="wishlist-item small crocs">
              <div class="wishlist-visual">
                <img src="./_resource/wishlist/crocs.png" alt="아기 크록스" />
              </div>
              <p class="wishlist-label">아기크록스</p>
            </article>

            <article class="wishlist-item small pass">
              <div class="wishlist-visual">
                <img src="./_resource/wishlist/freeticket.png" alt="자유이용권" />
              </div>
              <p class="wishlist-label">자유이용권 3회권</p>
            </article>

            <article class="wishlist-item small money">
              <div class="wishlist-visual">
                <img src="./_resource/wishlist/money-money-money.png" alt="미니 머니머니" />
              </div>
              <p class="wishlist-label">머니머니머니</p>
            </article>

            <article class="wishlist-item small mic">
              <div class="wishlist-visual">
                <img src="./_resource/wishlist/ceremony.png" alt="마이크 장난감" />
              </div>
              <p class="wishlist-label">돌잔치 축하공연</p>
            </article>
          </div>

          <div class="wishlist-column right">
            <article class="wishlist-item books">
              <div class="wishlist-visual">
                <img src="./_resource/wishlist/nolza.png" alt="그레이트북스 놀라운 자연" />
              </div>
              <p class="wishlist-label">그레이트북스-놀자 전집</p>
            </article>

            <article class="wishlist-item stack">
              <div class="wishlist-visual wishlist-stack-visual">
                <div class="wishlist-stack-header">
                  <p class="wishlist-label">캠핑의자/매트</p>
                </div>
                <div class="wishlist-stack-top">
                  <img src="./_resource/wishlist/camping-chair.png" alt="몬테라 CTV2 체어" />
                  <img src="./_resource/wishlist/camping-chair.png" alt="몬테라 CTV2 체어" />
                </div>
                <div class="wishlist-stack-bottom">
                  <img src="./_resource/wishlist/mat.png" alt="몬테라 전용 매트" />
                </div>
              </div>
            </article>

            <article class="wishlist-item lumi">
              <div class="wishlist-visual">
                <img src="./_resource/wishlist/cushion.png" alt="노리터 루미플레이쿠션" />
              </div>
              <p class="wishlist-label">노리터프로젝트_<br>루미 플레이쿠션</p>
            </article>
          </div>
        </div>
      </section>

    </main>
    <script src="./shared-header.js"></script>
    <script>
      const logViewportSizes = () => {
        console.log("window size:", {
          innerWidth: window.innerWidth,
          innerHeight: window.innerHeight,
          outerWidth: window.outerWidth,
          outerHeight: window.outerHeight,
        });

        console.log("screen size:", {
          width: window.screen.width,
          height: window.screen.height,
          availWidth: window.screen.availWidth,
          availHeight: window.screen.availHeight,
        });
      };

      window.addEventListener("load", logViewportSizes);
      window.addEventListener("resize", logViewportSizes);
    </script>
  </body>
</html>
